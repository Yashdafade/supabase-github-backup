name: Daily Supabase Backup

# on:
#   schedule:
#     - cron: '0 1 * * *'  # Every day at 1 AM UTC — adjust to your timezone
#   workflow_dispatch:       # Manual trigger from GitHub Actions tab

on:
  workflow_dispatch:       # Manual trigger only by default for template safety

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BACKUP_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: node scripts/backup.js

      - name: Commit and push backup files
        run: |
          git config user.name "Supabase Backup Bot"
          git config user.email "backup@supabase-github-backup"
          git add -f backups/
          git diff --staged --quiet || (git commit -m "Backup: $(date +%Y-%m-%d)" && git push)
